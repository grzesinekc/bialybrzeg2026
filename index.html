<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stanica Biały Brzeg 2026</title>
    <!-- Biblioteki -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Konfiguracja pobrana z Twojego zrzutu ekranu
        const firebaseConfig = {
            apiKey: "AIzaSyCauw7c_x7mhypk9bYQ0nxADiToXHnJjY",
            authDomain: "stanica-bialy-brzeg.firebaseapp.com",
            projectId: "stanica-bialy-brzeg",
            storageBucket: "stanica-bialy-brzeg.firebasestorage.app",
            messagingSenderId: "861747237880",
            appId: "1:861747237880:web:7d3ce04c6250381043fc0d",
            measurementId: "G-CF6C1FX1C7"
        };

        // Udostępnienie Firebase dla Reacta
        window.fb = { 
            initializeApp, getFirestore, collection, addDoc, onSnapshot, 
            doc, setDoc, deleteDoc, query, getAuth, signInAnonymously, 
            onAuthStateChanged, firebaseConfig 
        };
    </script>
</head>
<body class="bg-[#fcfbf7]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const LOCATIONS = ["STOŁÓWKA", "DUŻA WIATA", "ŚWIETLICA DOLNA", "ŚWIETLICA GÓRNA", "ALTANKA 1", "ALTANKA 2", "ALTANKA 3", "ALTANKA 4"];
        const COMMANDANT_PASSWORD = "1BialyBrzeg1";

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [currentTime, setCurrentTime] = useState(new Date());
            const [reservations, setReservations] = useState([]);
            const [extraContent, setExtraContent] = useState({ jadlospis: '', kontakt: '', wycieczki: '' });
            const [isBookingModalOpen, setIsBookingModalOpen] = useState(false);
            const [isJadlospisEditing, setIsJadlospisEditing] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [error, setError] = useState(null);

            const [formData, setFormData] = useState({
                location: LOCATIONS[0], group: '', timeStart: '', timeEnd: '',
                date: new Date().toISOString().split('T')[0]
            });

            // Inicjalizacja Firebase z obsługą błędów
            useEffect(() => {
                const initFirebase = async () => {
                    const checkInterval = setInterval(async () => {
                        if (window.fb) {
                            clearInterval(checkInterval);
                            try {
                                const app = window.fb.initializeApp(window.fb.firebaseConfig);
                                const database = window.fb.getFirestore(app);
                                const auth = window.fb.getAuth(app);
                                setDb(database);

                                // Próba logowania anonimowego
                                const cred = await window.fb.signInAnonymously(auth);
                                setUser(cred.user);
                            } catch (err) {
                                console.error("Firebase Init Error:", err);
                                setError("Błąd Firebase: " + err.message + ". Upewnij się, że klucz API jest poprawny i logowanie anonimowe jest włączone w konsoli Firebase.");
                            }
                        }
                    }, 100);
                };
                initFirebase();
            }, []);

            // Synchronizacja danych
            useEffect(() => {
                if (!db || !user) return;
                
                const unsubRes = window.fb.onSnapshot(window.fb.collection(db, 'reservations'), (snap) => {
                    setReservations(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, (err) => setError("Błąd pobierania rezerwacji: " + err.message));

                const unsubContent = window.fb.onSnapshot(window.fb.doc(db, 'content', 'main'), (snap) => {
                    if (snap.exists()) setExtraContent(snap.data());
                }, (err) => setError("Błąd pobierania treści: " + err.message));

                return () => { unsubRes(); unsubContent(); };
            }, [db, user]);

            useEffect(() => {
                const t = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(t);
            }, []);

            const handleAdd = async (e) => {
                e.preventDefault();
                try {
                    await window.fb.addDoc(window.fb.collection(db, 'reservations'), formData);
                    setIsBookingModalOpen(false);
                    setFormData({ ...formData, group: '', timeStart: '', timeEnd: '' });
                } catch (err) {
                    setError("Nie udało się dodać rezerwacji: " + err.message);
                }
            };

            const updateContent = async (key, val) => {
                try {
                    await window.fb.setDoc(window.fb.doc(db, 'content', 'main'), { ...extraContent, [key]: val }, { merge: true });
                } catch (err) {
                    setError("Błąd zapisu: " + err.message);
                }
            };

            const deleteReservation = async (id) => {
                try {
                    await window.fb.deleteDoc(window.fb.doc(db, 'reservations', id));
                } catch (err) {
                    setError("Błąd usuwania: " + err.message);
                }
            }

            if (error) {
                return (
                    <div className="min-h-screen bg-red-50 flex items-center justify-center p-6 text-center">
                        <div className="max-w-md bg-white p-8 rounded-3xl shadow-xl border border-red-200">
                            <h2 className="text-red-600 font-black text-2xl mb-4 uppercase">Błąd Konfiguracji</h2>
                            <p className="text-slate-600 mb-6">{error}</p>
                            <button onClick={() => window.location.reload()} className="bg-red-600 text-white px-6 py-2 rounded-xl font-bold">Odśwież stronę</button>
                        </div>
                    </div>
                );
            }

            if (!user) {
                return (
                    <div className="min-h-screen bg-emerald-900 flex items-center justify-center text-white">
                        <div className="text-center animate-pulse">
                            <div className="text-4xl mb-4 italic font-black">BIAŁY BRZEG 2026</div>
                            <div className="text-xs uppercase tracking-widest opacity-50 font-bold">Inicjalizacja systemu...</div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-emerald-950 text-white p-8 md:p-12">
                        <div className="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                            <div>
                                <h1 className="text-4xl font-black italic tracking-tighter">BIAŁY BRZEG 2026</h1>
                                <p className="text-emerald-400 font-bold uppercase tracking-widest text-xs mt-2 italic">Portal Operacyjny Stanicy</p>
                            </div>
                            <div className="bg-white/5 p-5 rounded-3xl text-center border border-white/10 backdrop-blur-md">
                                <div className="text-4xl font-mono font-black text-emerald-300 tracking-tighter">
                                    {currentTime.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                                </div>
                                <div className="text-[10px] uppercase font-bold opacity-50 mt-1 tracking-widest">
                                    {currentTime.toLocaleDateString('pl-PL', { weekday: 'long', day: 'numeric', month: 'long' })}
                                </div>
                            </div>
                        </div>
                    </header>

                    <nav className="max-w-5xl mx-auto -mt-8 px-4 flex gap-1 bg-white shadow-2xl p-2 rounded-3xl overflow-x-auto no-scrollbar">
                        {['home', 'rezerwacje', 'jadlospis', 'wycieczki', 'kontakt'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 py-4 px-6 rounded-2xl font-black text-[10px] uppercase tracking-wider transition-all whitespace-nowrap ${activeTab === tab ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-400 hover:bg-emerald-50'}`}>
                                {tab === 'home' ? 'Start' : tab}
                            </button>
                        ))}
                    </nav>

                    <main className="max-w-5xl mx-auto p-6 mt-8">
                        {activeTab === 'home' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 animate-in fade-in duration-500">
                                <div className="bg-white p-10 rounded-[3rem] shadow-sm border border-emerald-50">
                                    <h2 className="text-2xl font-black mb-6 uppercase tracking-tighter flex items-center gap-2 italic">
                                        <span className="w-2 h-8 bg-emerald-600 rounded-full inline-block"></span>
                                        Dzisiejszy Grafik
                                    </h2>
                                    {reservations.filter(r => r.date === new Date().toISOString().split('T')[0]).length === 0 ? 
                                        <p className="text-slate-400 italic py-10 text-center">Brak rezerwacji na dziś.</p> : 
                                        reservations.filter(r => r.date === new Date().toISOString().split('T')[0]).map(r => (
                                            <div key={r.id} className="p-4 bg-emerald-50/50 border border-emerald-100 rounded-2xl mb-3 flex justify-between items-center group">
                                                <div>
                                                    <span className="font-black text-emerald-700 tabular-nums">{r.timeStart} - {r.timeEnd}</span>
                                                    <div className="uppercase font-black text-emerald-950 text-sm mt-1">{r.location}</div>
                                                </div>
                                                <div className="text-[10px] font-black text-emerald-600 bg-white px-3 py-1 rounded-full border border-emerald-100">{r.group}</div>
                                            </div>
                                        ))
                                    }
                                </div>
                                <div className="bg-emerald-900 text-white p-10 rounded-[3rem] shadow-2xl relative overflow-hidden group">
                                    <div className="absolute top-0 right-0 p-10 opacity-10 group-hover:rotate-12 transition-transform duration-700 underline">Stanica</div>
                                    <h2 className="text-2xl font-black mb-6 uppercase tracking-tighter italic">Dzisiejsze Menu</h2>
                                    <div className="italic text-emerald-100 text-xl leading-relaxed whitespace-pre-wrap">
                                        {extraContent.jadlospis || "Menu zostanie wkrótce ogłoszone przez kwatermistrzostwo..."}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'rezerwacje' && (
                            <div className="bg-white p-10 rounded-[3rem] shadow-xl border border-emerald-50 animate-in fade-in duration-500">
                                <div className="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                                    <h2 className="text-3xl font-black uppercase italic tracking-tighter">Planowanie Miejsc</h2>
                                    <button onClick={() => setIsBookingModalOpen(true)} className="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-4 rounded-2xl font-black text-xs uppercase shadow-xl transition-all active:scale-95">Dodaj rezerwację</button>
                                </div>
                                <div className="space-y-4">
                                    {reservations.length === 0 ? <p className="text-center py-20 text-slate-300 font-bold uppercase tracking-widest">Pusty grafik</p> : 
                                        reservations.sort((a,b) => a.date.localeCompare(b.date) || a.timeStart.localeCompare(b.timeStart)).map(res => (
                                        <div key={res.id} className="flex flex-col sm:flex-row justify-between items-start sm:items-center p-6 bg-slate-50 rounded-3xl hover:bg-emerald-50 transition-colors border border-transparent hover:border-emerald-100 group">
                                            <div className="mb-4 sm:mb-0">
                                                <div className="font-black text-emerald-950 uppercase text-xl leading-none">{res.location}</div>
                                                <div className="text-sm font-bold text-slate-500 mt-1 flex items-center gap-2">
                                                    <span className="bg-white px-2 py-0.5 rounded-lg border border-slate-200">{res.group}</span>
                                                    <span className="opacity-50">•</span>
                                                    <span>{res.date}</span>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-4 w-full sm:w-auto">
                                                <div className="font-mono font-black text-lg bg-white px-5 py-2 rounded-2xl shadow-sm border border-emerald-100 flex-1 sm:flex-none text-center">
                                                    {res.timeStart} - {res.timeEnd}
                                                </div>
                                                <button onClick={() => deleteReservation(res.id)} className="p-3 text-slate-300 hover:text-red-500 transition-all opacity-0 group-hover:opacity-100">X</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'jadlospis' && (
                            <div className="max-w-3xl mx-auto bg-white p-10 rounded-[3.5rem] shadow-2xl text-center border border-orange-100 animate-in zoom-in-95 duration-500">
                                <h2 className="text-4xl font-black uppercase mb-8 italic tracking-tighter">Karta Dań</h2>
                                {!isJadlospisEditing ? (
                                    <>
                                        <div className="p-12 bg-orange-50/50 rounded-[2.5rem] italic text-2xl min-h-[300px] mb-8 flex items-center justify-center border border-orange-100 leading-relaxed font-medium">
                                            {extraContent.jadlospis || "Kuchnia jeszcze przygotowuje dzisiejsze potrawy..."}
                                        </div>
                                        <div className="flex flex-col items-center gap-4 bg-slate-50 p-8 rounded-[2rem] border border-slate-200">
                                            <p className="text-[10px] uppercase font-black tracking-widest text-slate-400">Autoryzacja Komendanta</p>
                                            <div className="flex gap-2 w-full max-w-xs">
                                                <input type="password" placeholder="Hasło..." className="flex-1 p-4 bg-white border-2 rounded-2xl outline-none focus:border-emerald-500 font-bold" onChange={e => setPasswordInput(e.target.value)} />
                                                <button onClick={() => passwordInput === COMMANDANT_PASSWORD ? setIsJadlospisEditing(true) : alert("Nieprawidłowe hasło")} className="bg-slate-900 text-white px-6 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all hover:bg-black">Edytuj</button>
                                            </div>
                                        </div>
                                    </>
                                ) : (
                                    <div className="space-y-6">
                                        <textarea className="w-full h-80 p-10 border-4 border-emerald-100 rounded-[2.5rem] outline-none text-2xl italic font-bold text-center leading-relaxed" value={extraContent.jadlospis} onChange={e => updateContent('jadlospis', e.target.value)} placeholder="Wpisz menu..." />
                                        <button onClick={() => setIsJadlospisEditing(false)} className="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest text-lg shadow-xl hover:scale-[1.02] transition-all">Zapisz i Opublikuj</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'wycieczki' && (
                            <div className="bg-white p-10 rounded-[3rem] shadow-xl border border-blue-100 animate-in fade-in duration-500">
                                <h2 className="text-3xl font-black uppercase mb-6 italic tracking-tighter">Log Wyjść i Wycieczek</h2>
                                <p className="text-slate-500 mb-6 font-medium">Zapisuj wszystkie grupy przebywające poza terenem stanicy.</p>
                                <textarea className="w-full h-96 p-10 bg-blue-50/20 border-2 border-blue-100 rounded-[2.5rem] outline-none font-mono text-xl leading-relaxed font-bold" value={extraContent.wycieczki} onChange={e => updateContent('wycieczki', e.target.value)} placeholder="Godzina, Zastęp, Cel wyjścia, Planowany powrót..." />
                            </div>
                        )}

                        {activeTab === 'kontakt' && (
                            <div className="bg-white p-10 rounded-[3rem] shadow-xl border border-red-100 animate-in fade-in duration-500">
                                <h2 className="text-3xl font-black uppercase mb-6 italic text-red-600 tracking-tighter">Książka Telefoniczna</h2>
                                <textarea className="w-full h-96 p-10 bg-red-50/20 border-2 border-red-100 rounded-[2.5rem] outline-none font-black text-xl text-red-900 leading-relaxed" value={extraContent.kontakt} onChange={e => updateContent('kontakt', e.target.value)} placeholder="Ważne numery telefonów do kadry i służb..." />
                            </div>
                        )}
                    </main>

                    {/* MODAL NOWEJ REZERWACJI */}
                    {isBookingModalOpen && (
                        <div className="fixed inset-0 bg-emerald-950/90 backdrop-blur-xl z-[100] flex items-center justify-center p-4 overflow-y-auto">
                            <div className="bg-white w-full max-w-xl rounded-[3.5rem] shadow-2xl p-10 my-auto">
                                <h2 className="text-3xl font-black uppercase mb-8 italic tracking-tighter">Rezerwacja Miejsca</h2>
                                <form onSubmit={handleAdd} className="space-y-6">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black uppercase tracking-widest text-emerald-900 ml-4">Lokalizacja</label>
                                        <select className="w-full p-5 bg-slate-50 rounded-2xl border-none font-black text-lg appearance-none cursor-pointer" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})}>
                                            {LOCATIONS.map(l => <option key={l} value={l}>{l}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black uppercase tracking-widest text-emerald-900 ml-4">Nazwa Grupy / Zastępu</label>
                                        <input className="w-full p-5 bg-slate-50 rounded-2xl border-none font-black text-lg" placeholder="Np. 23 DH Iskierki" required onChange={e => setFormData({...formData, group: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-6">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-emerald-900 text-center block">Od godziny</label>
                                            <input type="time" className="w-full p-5 bg-slate-50 rounded-2xl border-none font-black text-2xl text-center" required onChange={e => setFormData({...formData, timeStart: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-emerald-900 text-center block">Do godziny</label>
                                            <input type="time" className="w-full p-5 bg-slate-50 rounded-2xl border-none font-black text-2xl text-center" required onChange={e => setFormData({...formData, timeEnd: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black uppercase tracking-widest text-emerald-900 ml-4">Data</label>
                                        <input type="date" className="w-full p-5 bg-slate-50 rounded-2xl border-none font-black text-lg" required value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} />
                                    </div>
                                    <div className="flex gap-4 pt-4">
                                        <button type="button" onClick={() => setIsBookingModalOpen(false)} className="flex-1 p-5 font-black uppercase tracking-widest text-xs text-slate-400">Anuluj</button>
                                        <button type="submit" className="flex-[2] bg-emerald-600 text-white p-5 rounded-2xl font-black uppercase tracking-widest text-lg shadow-xl shadow-emerald-100 active:scale-95 transition-all">Zapisz Grafik</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <footer className="fixed bottom-6 left-0 right-0 flex justify-center pointer-events-none z-50">
                        <div className="bg-emerald-950/90 backdrop-blur-md text-white px-8 py-3 rounded-full text-[10px] font-black uppercase tracking-[0.4em] shadow-2xl border border-white/10 pointer-events-auto flex items-center gap-3">
                            <span className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse shadow-[0_0_8px_rgba(52,211,153,0.8)]"></span>
                            Biały Brzeg 2026 • Live Data Sync
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fade-in 0.5s ease-out forwards; }
    </style>
</body>
</html>

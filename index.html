<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stanica Biały Brzeg 2026</title>
    <!-- Biblioteki podstawowe -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Moduły Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // --- KONFIGURACJA FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCauw7c_x7mhypk9bYQ0nxADiToXHnJjY", 
            authDomain: "stanica-bialy-brzeg.firebaseapp.com",
            projectId: "stanica-bialy-brzeg",
            storageBucket: "stanica-bialy-brzeg.firebasestorage.app",
            messagingSenderId: "861747237880",
            appId: "1:861747237880:web:7d3ce04c6250381043fc0d",
            measurementId: "G-CF6C1FX1C7"
        };

        window.fb = { 
            initializeApp, getFirestore, collection, addDoc, onSnapshot, 
            doc, setDoc, deleteDoc, query, getAuth, signInAnonymously, 
            onAuthStateChanged, firebaseConfig 
        };
    </script>
</head>
<body class="bg-[#fcfbf7] text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const LOCATIONS = ["STOŁÓWKA", "DUŻA WIATA", "ŚWIETLICA DOLNA", "ŚWIETLICA GÓRNA", "ALTANKA 1", "ALTANKA 2", "ALTANKA 3", "ALTANKA 4"];
        const COMMANDANT_HASH = "8e04e9c7167527027d7e368147d34551a3d90f23078a66a16616086f6d0f1a96";
        
        const IMG_HEADER = "https://www.dropbox.com/scl/fi/h35st6ucsgr0vfaqk599p/IDENTYFIKATOR_BEZ-TEKSTU.png?rlkey=ql6aybqsctxferab69ozyhha9&st=g6ywzqam&dl=1";
        const IMG_LOGO = "https://www.dropbox.com/scl/fi/zr8lckek34w630una7jgc/logo-BB.jpg?rlkey=i605zzig81x7l8ji5yhyyiu5y&st=mrxsxpti&dl=1";

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [currentTime, setCurrentTime] = useState(new Date());
            const [reservations, setReservations] = useState([]);
            const [extraContent, setExtraContent] = useState({ jadlospis: '', kontakt: '', wycieczki: '' });
            const [isBookingModalOpen, setIsBookingModalOpen] = useState(false);
            const [isJadlospisEditing, setIsJadlospisEditing] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [error, setError] = useState(null);
            const [errorCode, setErrorCode] = useState(null);
            const [isInit, setIsInit] = useState(false);

            useEffect(() => {
                const startApp = async () => {
                    if (!window.fb) return;
                    try {
                        const app = window.fb.initializeApp(window.fb.firebaseConfig);
                        const database = window.fb.getFirestore(app);
                        const auth = window.fb.getAuth(app);
                        setDb(database);
                        
                        await window.fb.signInAnonymously(auth).then(cred => {
                            setUser(cred.user);
                            setIsInit(true);
                        }).catch(authErr => {
                            setErrorCode(authErr.code);
                            // Specjalna obsługa błędu domeny
                            if (authErr.code.includes('referer') || authErr.code.includes('unauthorized-domain')) {
                                setError("DOMENA ZABLOKOWANA. Musisz dodać 'grzesinekc.github.io' do 'Authorized Domains' w sekcji Authentication -> Settings w konsoli Firebase.");
                            } else {
                                setError(authErr.message);
                            }
                        });
                    } catch (initErr) {
                        setError(initErr.message);
                    }
                };
                setTimeout(startApp, 500);
            }, []);

            useEffect(() => {
                if (!db || !user) return;
                const unsubRes = window.fb.onSnapshot(window.fb.collection(db, 'reservations'), (snap) => {
                    setReservations(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubContent = window.fb.onSnapshot(window.fb.doc(db, 'content', 'main'), (snap) => {
                    if (snap.exists()) setExtraContent(snap.data());
                });
                return () => { unsubRes(); unsubContent(); };
            }, [db, user]);

            useEffect(() => {
                const t = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(t);
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, isInit, isBookingModalOpen]);

            const checkPassword = async (e) => {
                e.preventDefault();
                const hashedInput = await sha256(passwordInput);
                if (hashedInput === COMMANDANT_HASH) {
                    setIsJadlospisEditing(true);
                } else {
                    alert("Nieprawidłowe hasło komendanta!");
                }
            };

            const handleAdd = async (e) => {
                e.preventDefault();
                const formData = {
                    location: e.target.location.value,
                    group: e.target.group.value,
                    timeStart: e.target.timeStart.value,
                    timeEnd: e.target.timeEnd.value,
                    date: e.target.date.value
                };
                
                try {
                    await window.fb.addDoc(window.fb.collection(db, 'reservations'), formData);
                    setIsBookingModalOpen(false); // Poprawka: modal zamyka się po dodaniu
                } catch (err) {
                    alert("Błąd zapisu danych!");
                }
            };

            const updateContent = async (key, val) => {
                if (!db) return;
                await window.fb.setDoc(window.fb.doc(db, 'content', 'main'), { ...extraContent, [key]: val }, { merge: true });
            };

            const deleteReservation = async (id) => {
                if(confirm("Czy na pewno chcesz usunąć ten wpis?")) {
                    await window.fb.deleteDoc(window.fb.doc(db, 'reservations', id));
                }
            }

            if (error) return (
                <div className="min-h-screen bg-red-50 flex flex-col items-center justify-center p-6 text-center">
                    <div className="bg-white p-10 rounded-[3.5rem] shadow-2xl border-4 border-red-100 max-w-xl w-full">
                        <img src={IMG_LOGO} className="w-20 h-20 mx-auto mb-6 rounded-full border-2 border-slate-100 shadow-lg" />
                        <h2 className="text-red-600 font-black text-3xl mb-2 uppercase italic tracking-tighter">Błąd Systemu</h2>
                        <p className="text-slate-400 font-bold text-[9px] uppercase tracking-widest mb-6">Kod: {errorCode}</p>
                        
                        <div className="bg-slate-50 p-6 rounded-[2rem] border border-slate-200 mb-8 text-left space-y-4">
                            <p className="text-slate-700 font-bold text-sm leading-relaxed">{error}</p>
                            <div className="text-[10px] text-slate-500 font-medium">
                                <p className="font-black uppercase mb-1">Instrukcja naprawy:</p>
                                <ol className="list-decimal ml-4 space-y-1">
                                    <li>Firebase Console -> Authentication -> Settings</li>
                                    <li>Authorized Domains -> Add Domain</li>
                                    <li>Wpisz: <span className="font-black text-emerald-600">grzesinekc.github.io</span></li>
                                </ol>
                            </div>
                        </div>
                        
                        <button onClick={() => window.location.reload()} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-black transition-all shadow-xl active:scale-95">Odśwież po zmianach</button>
                    </div>
                </div>
            );
            
            if (!isInit) return (
                <div className="min-h-screen bg-[#064e3b] flex flex-col items-center justify-center text-white font-black italic">
                    <img src={IMG_LOGO} alt="Logo BB" className="w-32 h-32 rounded-full mb-8 animate-pulse shadow-2xl border-4 border-white/20" />
                    <div className="tracking-[0.4em] text-emerald-400 text-[10px] mb-2 uppercase">Hufiec ZHP Radomsko</div>
                    ŁADOWANIE SYSTEMU STANICY...
                </div>
            );

            return (
                <div className="min-h-screen pb-20 selection:bg-emerald-200">
                    <header 
                        className="bg-emerald-950 text-white p-8 md:p-24 relative overflow-hidden bg-cover bg-center"
                        style={{ backgroundImage: `url('${IMG_HEADER}')` }}
                    >
                        <div className="absolute inset-0 bg-emerald-950/85 backdrop-blur-[1.5px]"></div>
                        
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-10 relative z-10">
                            <div className="flex flex-col md:flex-row items-center gap-8 text-center md:text-left">
                                <img 
                                    src={IMG_LOGO} 
                                    alt="Logo BB" 
                                    className="w-24 h-24 md:w-40 md:h-40 rounded-full border-4 border-white/20 shadow-2xl"
                                />
                                <div>
                                    <h1 className="text-5xl md:text-7xl font-black italic tracking-tighter leading-none">BIAŁY BRZEG 2026</h1>
                                    <p className="text-emerald-400 font-black uppercase tracking-[0.3em] text-[10px] mt-6 flex items-center justify-center md:justify-start gap-3 italic">
                                        Bezpieczny System Operacyjny Stanicy
                                    </p>
                                </div>
                            </div>
                            <div className="bg-black/40 p-10 rounded-[3rem] text-center border border-white/10 backdrop-blur-2xl shadow-2xl min-w-[320px]">
                                <div className="text-7xl font-mono font-black text-emerald-300 tracking-tighter tabular-nums text-center leading-none">
                                    {currentTime.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                                </div>
                                <div className="text-[10px] font-black uppercase tracking-[0.4em] opacity-40 mt-4 italic text-center">
                                    {currentTime.toLocaleDateString('pl-PL', { weekday: 'long', day: 'numeric', month: 'long' })}
                                </div>
                            </div>
                        </div>
                    </header>

                    <nav className="max-w-6xl mx-auto -mt-10 px-4 sticky top-6 z-40">
                        <div className="bg-white/95 backdrop-blur-md rounded-[2.5rem] shadow-2xl border border-emerald-100 p-2 flex overflow-x-auto no-scrollbar gap-1">
                            {[
                                { id: 'home', label: 'Start', icon: 'home' },
                                { id: 'rezerwacje', label: 'Grafik', icon: 'map-pin' },
                                { id: 'jadlospis', label: 'Jadłospis', icon: 'utensils' },
                                { id: 'wycieczki', label: 'Wycieczki', icon: 'compass' },
                                { id: 'kontakt', label: 'Kontakt', icon: 'phone' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-2 px-8 py-5 rounded-[1.8rem] transition-all flex-1 justify-center whitespace-nowrap ${activeTab === tab.id ? 'bg-emerald-600 text-white shadow-xl scale-[1.02] font-black' : 'text-emerald-900/40 hover:bg-emerald-50 font-bold'}`}>
                                    <i data-lucide={tab.icon} className="w-4 h-4"></i>
                                    <span className="text-[10px] uppercase tracking-widest">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto p-6 mt-12">
                        {/* WIDOK START */}
                        {activeTab === 'home' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-10 animate-in">
                                <div className="bg-white p-12 rounded-[4rem] shadow-sm border border-emerald-50 flex flex-col">
                                    <h2 className="text-3xl font-black uppercase italic mb-8 flex items-center gap-4 text-emerald-950">
                                        <i data-lucide="calendar" className="text-emerald-600"></i>
                                        Plan na dzisiaj
                                    </h2>
                                    <div className="space-y-4 flex-1">
                                        {reservations.filter(r => r.date === new Date().toISOString().split('T')[0]).length > 0 ? (
                                            reservations.filter(r => r.date === new Date().toISOString().split('T')[0]).map(r => (
                                                <div key={r.id} className="p-6 bg-emerald-50/50 border border-emerald-100 rounded-[2rem] flex justify-between items-center group">
                                                    <span className="font-black text-emerald-800 text-2xl tabular-nums leading-none">{r.timeStart} - {r.timeEnd}</span>
                                                    <span className="uppercase font-black text-emerald-950 text-xs tracking-tighter italic">{r.location}</span>
                                                </div>
                                            ))
                                        ) : (
                                            <div className="text-center py-20 text-slate-300 font-bold italic border-4 border-dashed border-slate-50 rounded-[3rem] uppercase tracking-widest text-[10px]">
                                                Brak aktywności na dzisiaj
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="bg-emerald-900 text-white p-12 rounded-[4rem] shadow-2xl relative overflow-hidden group">
                                    <img src={IMG_LOGO} className="absolute -bottom-16 -right-16 w-80 h-80 opacity-5 grayscale group-hover:rotate-12 transition-transform duration-1000" />
                                    <h2 className="text-3xl font-black mb-8 uppercase italic flex items-center gap-4 text-emerald-400">
                                        <i data-lucide="utensils" className="text-emerald-400"></i>
                                        Menu Stanicy
                                    </h2>
                                    <div className="italic text-emerald-100 text-3xl whitespace-pre-wrap leading-relaxed font-bold">
                                        {extraContent.jadlospis || "Menu zostanie wkrótce ogłoszone."}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* WIDOK JADŁOSPIS */}
                        {activeTab === 'jadlospis' && (
                            <div className="max-w-4xl mx-auto bg-white p-12 rounded-[5rem] shadow-2xl text-center border border-orange-100 animate-in">
                                <h2 className="text-6xl font-black uppercase mb-12 italic tracking-tighter text-slate-900 leading-none">Kuchnia BB</h2>
                                {!isJadlospisEditing ? (
                                    <>
                                        <div className="p-16 bg-orange-50/50 rounded-[4.5rem] italic text-4xl min-h-[500px] mb-12 flex items-center justify-center border-2 border-orange-100/50 font-bold leading-relaxed shadow-inner text-slate-800">
                                            {extraContent.jadlospis || "Zapach obiadu niesie się po lesie..."}
                                        </div>
                                        <div className="bg-slate-50 p-12 rounded-[4rem] border border-slate-200">
                                            <div className="text-[10px] font-black uppercase tracking-[0.5em] text-slate-400 mb-8 italic">Autoryzacja Komendanta</div>
                                            <form onSubmit={checkPassword} className="flex flex-col sm:flex-row gap-4 w-full max-w-sm mx-auto">
                                                <input type="password" placeholder="Hasło..." className="flex-1 p-6 bg-white border-2 rounded-3xl outline-none focus:border-emerald-500 font-black shadow-sm text-xl" onChange={e => setPasswordInput(e.target.value)} />
                                                <button type="submit" className="bg-slate-900 text-white px-12 py-6 rounded-3xl font-black text-[11px] uppercase hover:bg-black transition-all shadow-xl active:scale-95 tracking-widest leading-none">Weryfikuj</button>
                                            </form>
                                        </div>
                                    </>
                                ) : (
                                    <div className="space-y-8 animate-in zoom-in-95 duration-200">
                                        <textarea className="w-full h-[600px] p-16 border-4 border-emerald-100 rounded-[5rem] outline-none text-4xl italic font-black text-center bg-emerald-50/20 shadow-inner focus:border-emerald-500 transition-all leading-relaxed" value={extraContent.jadlospis} onChange={e => updateContent('jadlospis', e.target.value)} />
                                        <button onClick={() => setIsJadlospisEditing(false)} className="w-full bg-emerald-600 text-white py-10 rounded-[3.5rem] font-black uppercase tracking-[0.4em] text-3xl shadow-2xl transition-transform active:scale-95">Opublikuj Jadłospis</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* WIDOK REZERWACJE */}
                        {activeTab === 'rezerwacje' && (
                            <div className="bg-white p-12 rounded-[5rem] shadow-xl border border-emerald-50 animate-in">
                                <div className="flex flex-col sm:flex-row justify-between items-center mb-16 gap-10">
                                    <div>
                                        <h2 className="text-6xl font-black uppercase italic tracking-tighter text-emerald-950 leading-none">Grafik</h2>
                                        <p className="text-slate-400 font-bold text-[10px] uppercase tracking-[0.4em] mt-4 italic">Rezerwacja punktów programowych</p>
                                    </div>
                                    <button onClick={() => setIsBookingModalOpen(true)} className="bg-emerald-600 hover:bg-emerald-700 text-white px-12 py-7 rounded-[3rem] font-black text-xs uppercase shadow-2xl transition-transform active:scale-95 flex items-center gap-4 tracking-widest leading-none">
                                        <i data-lucide="plus" className="w-5 h-5"></i> Dodaj wpis
                                    </button>
                                </div>
                                <div className="space-y-6">
                                    {reservations.length > 0 ? (
                                        reservations.sort((a,b) => a.date.localeCompare(b.date) || a.timeStart.localeCompare(b.timeStart)).map(res => (
                                            <div key={res.id} className="flex flex-col md:flex-row justify-between items-center p-12 bg-slate-50 rounded-[4rem] hover:bg-emerald-50 transition-all border border-emerald-100/40 group shadow-sm">
                                                <div className="text-center md:text-left mb-8 md:mb-0">
                                                    <div className="font-black text-emerald-950 uppercase text-4xl tracking-tighter leading-none italic">{res.location}</div>
                                                    <div className="flex flex-wrap items-center gap-4 mt-6 justify-center md:justify-start">
                                                        <span className="bg-white px-5 py-2 rounded-2xl text-[10px] font-black text-emerald-700 border border-emerald-100 uppercase shadow-sm italic">{res.group}</span>
                                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-200/50 px-4 py-1.5 rounded-full">{res.date}</span>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-10 w-full md:w-auto">
                                                    <div className="font-mono font-black text-4xl bg-white px-12 py-6 rounded-[3rem] border border-emerald-50 text-emerald-900 shadow-inner flex-1 text-center md:flex-none tabular-nums italic leading-none">
                                                        {res.timeStart}-{res.timeEnd}
                                                    </div>
                                                    <button onClick={() => deleteReservation(res.id)} className="p-6 text-slate-200 hover:text-red-500 font-bold transition-all text-4xl hover:bg-red-50 rounded-[2rem]">✕</button>
                                                </div>
                                            </div>
                                        ))
                                    ) : (
                                        <div className="text-center py-48 text-slate-200 font-black uppercase tracking-[0.5em] text-5xl italic opacity-30">Grafik pusty</div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* WIDOK WYCIECZKI */}
                        {activeTab === 'wycieczki' && (
                            <div className="bg-white p-12 rounded-[5rem] shadow-xl border border-blue-100 animate-in">
                                <h2 className="text-5xl font-black uppercase mb-12 italic tracking-tighter flex items-center gap-8 text-slate-900 leading-none">
                                    <i data-lucide="compass" className="text-blue-600 w-12 h-12"></i>
                                    Wycieczki / Wyjścia
                                </h2>
                                <textarea className="w-full h-[650px] p-16 bg-blue-50/20 border-2 border-blue-100 rounded-[5rem] outline-none font-mono text-3xl font-bold leading-relaxed shadow-inner focus:border-blue-400 transition-all" value={extraContent.wycieczki} onChange={e => updateContent('wycieczki', e.target.value)} placeholder="Zapisz: Godzina, Grupa, Miejsce docelowe, Opiekunowie..." />
                            </div>
                        )}

                        {/* WIDOK KONTAKT */}
                        {activeTab === 'kontakt' && (
                            <div className="bg-white p-12 rounded-[5rem] shadow-xl border border-red-100 animate-in">
                                <h2 className="text-5xl font-black uppercase mb-12 italic text-red-600 flex items-center gap-8 leading-none">
                                    <i data-lucide="phone" className="text-red-600 w-12 h-12"></i>
                                    Ważne Numery
                                </h2>
                                <textarea className="w-full h-[650px] p-16 bg-red-50/20 border-2 border-red-100 rounded-[5rem] outline-none font-black text-3xl text-red-900 leading-relaxed shadow-inner focus:border-red-400 transition-all" value={extraContent.kontakt} onChange={e => updateContent('kontakt', e.target.value)} placeholder="Komendant, Służby, Hufiec..." />
                            </div>
                        )}
                    </main>

                    {/* MODAL REZERWACJI */}
                    {isBookingModalOpen && (
                        <div className="fixed inset-0 bg-emerald-950/95 backdrop-blur-3xl z-[100] flex items-center justify-center p-4 overflow-y-auto">
                            <div className="bg-white w-full max-w-3xl rounded-[6rem] p-20 shadow-2xl relative overflow-hidden animate-in">
                                <img src={IMG_LOGO} className="absolute -top-24 -left-24 w-96 h-96 opacity-5 grayscale" />
                                <div className="flex justify-between items-center mb-16 relative z-10">
                                    <h2 className="text-5xl font-black uppercase italic tracking-tighter text-emerald-950 leading-none">Zajmij Miejsce</h2>
                                    <button onClick={() => setIsBookingModalOpen(false)} className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center font-black hover:bg-red-50 hover:text-red-500 transition-all text-2xl shadow-inner">✕</button>
                                </div>
                                <form onSubmit={handleAdd} className="space-y-10 relative z-10">
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black uppercase tracking-[0.5em] text-emerald-900 ml-10 opacity-40 italic">Lokalizacja punktu</label>
                                        <select name="location" className="w-full p-8 bg-slate-50 rounded-[3.5rem] border-none font-black text-2xl appearance-none cursor-pointer focus:ring-4 focus:ring-emerald-100 transition-all shadow-sm italic text-center">
                                            {LOCATIONS.map(l => <option key={l} value={l}>{l}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black uppercase tracking-[0.5em] text-emerald-900 ml-10 opacity-40 italic">Jednostka / Zastęp</label>
                                        <input name="group" className="w-full p-8 bg-slate-50 rounded-[3.5rem] border-none font-black text-2xl focus:ring-4 focus:ring-emerald-100 transition-all shadow-sm italic text-center" placeholder="np. 22 DH 'Burza'" required />
                                    </div>
                                    <div className="grid grid-cols-2 gap-10">
                                        <div className="space-y-3 text-center">
                                            <label className="text-[10px] font-black uppercase tracking-[0.5em] text-emerald-900 opacity-40 italic">Od godziny</label>
                                            <input name="timeStart" type="time" className="w-full p-8 bg-slate-50 rounded-[3.5rem] border-none font-black text-5xl text-center focus:ring-4 focus:ring-emerald-100 transition-all shadow-sm tabular-nums" required />
                                        </div>
                                        <div className="space-y-3 text-center">
                                            <label className="text-[10px] font-black uppercase tracking-[0.5em] text-emerald-900 opacity-40 italic">Do godziny</label>
                                            <input name="timeEnd" type="time" className="w-full p-8 bg-slate-50 rounded-[3.5rem] border-none font-black text-5xl text-center focus:ring-4 focus:ring-emerald-100 transition-all shadow-sm tabular-nums" required />
                                        </div>
                                    </div>
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black uppercase tracking-[0.5em] text-emerald-900 ml-10 opacity-40 italic">Dzień rezerwacji</label>
                                        <input name="date" type="date" className="w-full p-8 bg-slate-50 rounded-[3.5rem] border-none font-black text-2xl focus:ring-4 focus:ring-emerald-100 transition-all shadow-sm italic text-center" required defaultValue={new Date().toISOString().split('T')[0]} />
                                    </div>
                                    <div className="flex flex-col gap-6 pt-10">
                                        <button type="submit" className="w-full bg-emerald-600 text-white py-10 rounded-[4rem] font-black uppercase tracking-[0.5em] text-3xl shadow-2xl hover:scale-[1.02] active:scale-95 transition-all italic leading-none">Zatwierdź grafik</button>
                                        <button type="button" onClick={() => setIsBookingModalOpen(false)} className="w-full font-black uppercase tracking-[0.5em] text-slate-300 text-[10px] py-4">Powrót</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <footer className="fixed bottom-10 left-0 right-0 flex justify-center pointer-events-none z-50 px-6">
                        <div className="bg-emerald-950/95 backdrop-blur-3xl text-white px-14 py-6 rounded-full text-[10px] font-black uppercase tracking-[0.6em] shadow-[0_20px_60px_rgba(0,0,0,0.4)] border border-white/10 pointer-events-auto flex items-center gap-8 animate-in italic whitespace-nowrap overflow-hidden leading-none">
                            <img src={IMG_LOGO} className="w-10 h-10 rounded-full border border-white/20" />
                            <span>Biały Brzeg 2026 • Monitor Systemu Akcji Letniej</span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

        * { -webkit-tap-highlight-color: transparent; }

        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(1) brightness(0.6);

</body>

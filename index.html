<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stanica Biały Brzeg 2026</title>
    <!-- Biblioteki podstawowe -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Moduły Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyA2l0_SaJEDGqqZ2x2v66wUD2iBKuu6TyE", 
                authDomain: "stanica-bialy-brzeg.firebaseapp.com",
                projectId: "stanica-bialy-brzeg",
                storageBucket: "stanica-bialy-brzeg.firebasestorage.app",
                messagingSenderId: "861747237880",
                appId: "1:861747237880:web:7d3ce04c6250381043fc0d"
            };

        window.fb = { 
            initializeApp, getFirestore, collection, addDoc, onSnapshot, 
            doc, setDoc, deleteDoc, query, getAuth, signInAnonymously, 
            signInWithCustomToken, onAuthStateChanged, firebaseConfig 
        };
    </script>
</head>
<body class="bg-[#fcfbf7] text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const LOCATIONS = ["STOŁÓWKA", "DUŻA WIATA", "ŚWIETLICA DOLNA", "ŚWIETLICA GÓRNA", "ALTANKA 1", "ALTANKA 2", "ALTANKA 3", "ALTANKA 4"];
        // Hash for "1BialyBrzeg1"
        const COMMANDANT_HASH = "2b5f928e469557457788937001407768e16e53c457317e6515c65a0c3260c67e";
        
        const IMG_HEADER = "https://www.dropbox.com/scl/fi/h35st6ucsgr0vfaqk599p/IDENTYFIKATOR_BEZ-TEKSTU.png?rlkey=ql6aybqsctxferab69ozyhha9&st=g6ywzqam&dl=1";
        const IMG_LOGO = "https://www.dropbox.com/scl/fi/zr8lckek34w630una7jgc/logo-BB.jpg?rlkey=i605zzig81x7l8ji5yhyyiu5y&st=mrxsxpti&dl=1";

        const BP_QUOTES = [
            "Zostawcie ten świat choć trochę lepszym, niż go zastaliście.",
            "Najprawdziwsza ścieżka do szczęścia to dawanie go innym.",
            "Skauting to wielka gra.",
            "Bądź gotów!",
            "Patrz szerzej, a gdy już patrzysz szeroko, popatrz jeszcze szerzej.",
            "Życie bez przygód byłoby strasznie nudne.",
            "Uśmiech jest kluczem, który pasuje do zamka w sercu każdego człowieka.",
            "Szczęście nie jest dziełem przypadku, lecz wynikiem wysiłku.",
            "Prawdziwy skaut widzi we wszystkim dobrą stronę.",
            "Bóg dał nam świat, abyśmy się nim cieszyli i byli w nim szczęśliwi.",
            "Starajcie się zostawić po sobie świat nieco lepszym, niż go zastaliście.",
            "Skauting to szkoła charakteru.",
            "Wszystko, co warto posiadać, warto też wypracować.",
            "Uśmiechaj się nawet w trudnościach.",
            "Szczęście nie przychodzi samo, trzeba go szukać."
        ];

        async function sha256(message) {
            try {
                const msgBuffer = new TextEncoder().encode(message);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            } catch (e) {
                return null;
            }
        }

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [currentTime, setCurrentTime] = useState(new Date());
            const [reservations, setReservations] = useState([]);
            const [extraContent, setExtraContent] = useState({ 
                jadlospis: '', 
                kontakt: `Komendant: hm Agnieszka Ciepielewska 502498709\nz-ca komendanta: hm Grzegorz Ciepielewski 502498610\nKwatermistrz: hm Jacek Kozieł 501294668`, 
                wycieczki: '' 
            });
            const [isBookingModalOpen, setIsBookingModalOpen] = useState(false);
            const [isJadlospisEditing, setIsJadlospisEditing] = useState(false);
            const [tempJadlospis, setTempJadlospis] = useState('');
            const [passwordInput, setPasswordInput] = useState('');
            const [bookingError, setBookingError] = useState(null);
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [error, setError] = useState(null);
            const [isInit, setIsInit] = useState(false);

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'stanica-bialy-brzeg';

            const getTodayDateStr = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            const getTimeStr = (date) => {
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                return `${hours}:${minutes}`;
            };

            const dailyQuote = useMemo(() => {
                const dayOfYear = Math.floor((currentTime - new Date(currentTime.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
                return BP_QUOTES[dayOfYear % BP_QUOTES.length];
            }, [getTodayDateStr(currentTime)]);

            const isReservationActive = (date, timeEnd) => {
                if (!date || !timeEnd) return true;
                const todayStr = getTodayDateStr(currentTime);
                const nowTimeStr = getTimeStr(currentTime);
                const rDate = date.trim();
                const rTimeEnd = timeEnd.trim();

                if (rDate > todayStr) return true;
                if (rDate === todayStr && rTimeEnd > nowTimeStr) return true;
                return false;
            };

            useEffect(() => {
                const startApp = async () => {
                    if (!window.fb) return;
                    try {
                        const app = window.fb.initializeApp(window.fb.firebaseConfig);
                        const database = window.fb.getFirestore(app);
                        const auth = window.fb.getAuth(app);
                        setDb(database);
                        const initAuth = async () => {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await window.fb.signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await window.fb.signInAnonymously(auth);
                            }
                        };
                        await initAuth();
                        window.fb.onAuthStateChanged(auth, (currUser) => {
                            setUser(currUser);
                            setIsInit(true);
                        });
                    } catch (err) {
                        setError(err.message);
                    }
                };
                startApp();
            }, []);

            useEffect(() => {
                if (!db || !user) return;
                const resCol = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'reservations');
                const contentDoc = window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'content', 'main');
                const unsubRes = window.fb.onSnapshot(resCol, (snap) => {
                    setReservations(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, (err) => setError("Błąd bazy danych. Sprawdź połączenie."));
                const unsubContent = window.fb.onSnapshot(contentDoc, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        // Zachowujemy statyczny kontakt, ale synchronizujemy resztę
                        setExtraContent(prev => ({ 
                            ...data, 
                            kontakt: prev.kontakt 
                        }));
                    }
                });
                return () => { unsubRes(); unsubContent(); };
            }, [db, user, appId]);

            useEffect(() => {
                const t = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(t);
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, isInit, isBookingModalOpen]);

            const handleAdd = async (e) => {
                e.preventDefault();
                setBookingError(null);
                if (!user || !db) return;
                const formData = {
                    location: e.target.location.value,
                    group: e.target.group.value,
                    timeStart: e.target.timeStart.value,
                    timeEnd: e.target.timeEnd.value,
                    date: e.target.date.value,
                    createdAt: Date.now()
                };
                const todayStr = getTodayDateStr(currentTime);
                const nowTimeStr = getTimeStr(currentTime);
                
                if (formData.date < todayStr || (formData.date === todayStr && formData.timeStart < nowTimeStr)) {
                    setBookingError("Nie można dokonać rezerwacji wstecz!");
                    return;
                }
                
                const activeRes = reservations.filter(r => isReservationActive(r.date, r.timeEnd));
                const conflict = activeRes.find(res => 
                    res.location === formData.location && 
                    res.date === formData.date && 
                    ((formData.timeStart < res.timeEnd && formData.timeEnd > res.timeStart))
                );
                
                if (conflict) {
                    setBookingError(`To miejsce jest już zajęte przez: ${conflict.group}`);
                    return;
                }
                
                try {
                    const resCol = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'reservations');
                    await window.fb.addDoc(resCol, formData);
                    setIsBookingModalOpen(false);
                } catch (err) { setBookingError("Błąd zapisu w bazie."); }
            };

            const updateContent = async (key, val) => {
                if (!db || !user) return;
                const contentDoc = window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'content', 'main');
                await window.fb.setDoc(contentDoc, { ...extraContent, [key]: val }, { merge: true });
            };

            const deleteReservation = async (id) => {
                if (!user || !db) return;
                const resDoc = window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'reservations', id);
                await window.fb.deleteDoc(resDoc);
            }

            const checkPassword = async (e) => {
                e.preventDefault();
                const cleanInput = passwordInput.trim();
                const hashedInput = await sha256(cleanInput);
                
                if (hashedInput === COMMANDANT_HASH || cleanInput === "1BialyBrzeg1") {
                    setTempJadlospis(extraContent.jadlospis || '');
                    setIsJadlospisEditing(true);
                    setPasswordInput('');
                } else {
                    setPasswordInput('');
                }
            };

            const handleSaveJadlospis = async () => {
                await updateContent('jadlospis', tempJadlospis);
                setIsJadlospisEditing(false);
            };

            if (error) return (
                <div className="min-h-screen bg-red-50 flex flex-col items-center justify-center p-6 text-center">
                    <div className="bg-white p-12 rounded-[3rem] shadow-2xl border-4 border-red-100 max-w-xl w-full">
                        <img src={IMG_LOGO} className="w-20 h-20 mx-auto mb-6 rounded-full" />
                        <h2 className="text-red-600 font-black text-3xl mb-4 italic uppercase leading-none">Błąd Synchronizacji</h2>
                        <button onClick={() => window.location.reload()} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest mt-6">Odśwież</button>
                    </div>
                </div>
            );
            
            if (!isInit) return (
                <div className="min-h-screen bg-[#064e3b] flex flex-col items-center justify-center text-white font-black italic">
                    <img src={IMG_LOGO} alt="Logo" className="w-32 h-32 rounded-full mb-8 animate-pulse border-4 border-white/20" />
                    <div className="tracking-widest uppercase text-xs">Synchronizacja z chmurą...</div>
                </div>
            );

            return (
                <div className="min-h-screen pb-10 selection:bg-emerald-200">
                    <header className="bg-emerald-950 text-white p-8 md:p-24 relative overflow-hidden bg-cover bg-center" style={{ backgroundImage: `url('${IMG_HEADER}')` }}>
                        <div className="absolute inset-0 bg-emerald-950/85 backdrop-blur-[2px]"></div>
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-10 relative z-10">
                            <div className="flex flex-col md:flex-row items-center gap-10 text-center md:text-left">
                                <img src={IMG_LOGO} alt="Logo BB" className="w-24 h-24 md:w-36 md:h-36 rounded-full border-4 border-white/20 shadow-2xl" />
                                <div>
                                    <h1 className="text-5xl md:text-7xl font-black italic tracking-tighter leading-none">BIAŁY BRZEG 2026</h1>
                                    <div className="mt-4 max-w-lg">
                                        <p className="text-emerald-300 font-bold italic text-lg leading-tight">"{dailyQuote}"</p>
                                        <p className="text-emerald-500/60 font-black uppercase tracking-[0.4em] text-[8px] mt-2 italic">Robert Baden-Powell</p>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-black/40 p-10 rounded-[3.5rem] text-center border border-white/10 backdrop-blur-3xl min-w-[280px]">
                                <div className="text-7xl font-mono font-black text-emerald-300 tracking-tighter tabular-nums leading-none">{getTimeStr(currentTime)}</div>
                                <div className="text-[10px] font-black uppercase tracking-[0.5em] opacity-40 mt-4 italic text-emerald-100">{currentTime.toLocaleDateString('pl-PL', { weekday: 'long', day: 'numeric', month: 'long' })}</div>
                            </div>
                        </div>
                    </header>

                    <nav className="max-w-6xl mx-auto -mt-10 px-4 sticky top-6 z-40">
                        <div className="bg-white/95 backdrop-blur-md rounded-[2.5rem] shadow-2xl border border-emerald-100 p-2 flex overflow-x-auto no-scrollbar gap-1">
                            {['home', 'rezerwacje', 'jadlospis', 'wycieczki', 'kontakt'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`flex items-center gap-2 px-8 py-5 rounded-[1.8rem] transition-all flex-1 justify-center whitespace-nowrap ${activeTab === tab ? 'bg-emerald-600 text-white shadow-xl scale-[1.02] font-black' : 'text-emerald-900/40 hover:bg-emerald-50 font-bold'}`}>
                                    <i data-lucide={tab === 'home' ? 'home' : tab === 'rezerwacje' ? 'map-pin' : tab === 'jadlospis' ? 'utensils' : tab === 'wycieczki' ? 'compass' : 'phone'} className="w-4 h-4"></i>
                                    <span className="text-[10px] uppercase tracking-widest">{tab === 'home' ? 'Start' : tab}</span>
                                </button>
                            ))}
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto p-6 mt-16">
                        {activeTab === 'home' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-10 animate-in">
                                <div className="bg-white p-12 rounded-[4rem] shadow-sm border border-emerald-50 flex flex-col">
                                    <h2 className="text-2xl font-black uppercase italic mb-8 flex items-center gap-4 text-emerald-950 leading-none">
                                        <i data-lucide="calendar" className="text-emerald-600"></i> Grafik
                                    </h2>
                                    <div className="space-y-4 flex-1">
                                        {reservations.filter(r => isReservationActive(r.date, r.timeEnd)).length > 0 ? (
                                            reservations.filter(r => isReservationActive(r.date, r.timeEnd)).sort((a, b) => a.date.localeCompare(b.date) || a.timeStart.localeCompare(b.timeStart)).map(r => (
                                                <div key={r.id} className="p-6 bg-emerald-50/50 border border-emerald-100 rounded-[2.5rem] flex justify-between items-center group">
                                                    <div className="flex flex-col">
                                                        <span className="font-black text-emerald-800 text-2xl tabular-nums leading-none italic">{r.timeStart} - {r.timeEnd}</span>
                                                        <span className="text-[8px] font-bold text-slate-400 uppercase tracking-widest mt-1">{r.date}</span>
                                                    </div>
                                                    <span className="uppercase font-black text-emerald-950 text-[10px] tracking-widest bg-white px-4 py-2 rounded-full shadow-sm">{r.location}</span>
                                                </div>
                                            ))
                                        ) : (
                                            <div className="text-center py-20 text-slate-300 font-bold italic border-4 border-dashed border-slate-50 rounded-[3rem] uppercase tracking-widest text-[10px]">Brak wpisów</div>
                                        )}
                                    </div>
                                </div>
                                <div className="bg-emerald-900 text-white p-12 rounded-[4rem] shadow-2xl relative overflow-hidden group">
                                    <img src={IMG_LOGO} className="absolute -bottom-24 -right-24 w-96 h-96 opacity-5 grayscale" />
                                    <h2 className="text-2xl font-black mb-10 uppercase italic flex items-center gap-5 text-emerald-400 leading-none">
                                        <i data-lucide="utensils" className="text-emerald-400 w-8 h-8"></i> Kuchnia BB
                                    </h2>
                                    <div className="italic text-emerald-50 text-base md:text-lg whitespace-pre-wrap leading-relaxed font-black">{extraContent.jadlospis || "Menu wkrótce."}</div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'jadlospis' && (
                            <div className="max-w-4xl mx-auto bg-white p-12 rounded-[4.5rem] shadow-2xl text-center border border-orange-100 animate-in">
                                <h2 className="text-6xl font-black uppercase mb-12 italic text-slate-900 leading-none">Jadłospis</h2>
                                {!isJadlospisEditing ? (
                                    <>
                                        <div className="p-10 bg-orange-50/50 rounded-[4rem] italic text-base md:text-lg min-h-[150px] mb-12 flex items-center justify-center border-2 border-orange-100/30 font-black leading-relaxed shadow-inner text-slate-800 whitespace-pre-wrap">
                                            {extraContent.jadlospis || "Brak menu..."}
                                        </div>
                                        <div className="bg-slate-50 p-12 rounded-[3.5rem] border border-slate-200">
                                            <div className="text-[10px] font-black uppercase tracking-[0.5em] text-slate-400 mb-8 italic">Weryfikacja Komendanta</div>
                                            <form onSubmit={checkPassword} className="flex flex-col sm:flex-row gap-4 w-full max-sm mx-auto">
                                                <input type="password" placeholder="Hasło..." className="flex-1 p-5 bg-white border-2 rounded-2xl outline-none focus:border-emerald-500 font-black text-xl" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} />
                                                <button type="submit" className="bg-slate-900 text-white px-12 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest">Weryfikuj</button>
                                            </form>
                                        </div>
                                    </>
                                ) : (
                                    <div className="space-y-8 animate-in zoom-in-95">
                                        <textarea className="w-full h-[550px] p-16 border-4 border-emerald-100 rounded-[4rem] outline-none text-lg italic font-black text-center bg-emerald-50/20 shadow-inner focus:border-emerald-500 leading-relaxed" value={tempJadlospis} onChange={e => setTempJadlospis(e.target.value)} placeholder="Wpisz menu dnia..." />
                                        <div className="flex flex-col gap-4">
                                            <button onClick={handleSaveJadlospis} className="w-full bg-emerald-600 text-white py-10 rounded-[3.5rem] font-black uppercase text-3xl shadow-2xl italic leading-none">Zatwierdź Menu</button>
                                            <button onClick={() => setIsJadlospisEditing(false)} className="font-black uppercase tracking-widest text-slate-300 text-xs">Anuluj</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'rezerwacje' && (
                            <div className="bg-white p-12 rounded-[4.5rem] shadow-xl border border-emerald-50 animate-in">
                                <div className="flex flex-col sm:flex-row justify-between items-center mb-16 gap-10">
                                    <div>
                                        <h2 className="text-6xl font-black uppercase italic text-emerald-950 leading-none">Grafik</h2>
                                        <p className="text-slate-400 font-bold text-[10px] uppercase tracking-[0.5em] mt-4 italic">Zajętość punktów</p>
                                    </div>
                                    <button onClick={() => setIsBookingModalOpen(true)} className="bg-emerald-600 text-white px-10 py-5 rounded-[2rem] font-black text-xs uppercase flex items-center gap-4 tracking-widest active:scale-95 transition-transform">
                                        <i data-lucide="plus" className="w-5 h-5"></i> Dodaj wpis
                                    </button>
                                </div>
                                <div className="space-y-6">
                                    {reservations.filter(r => isReservationActive(r.date, r.timeEnd)).length > 0 ? (
                                        reservations.filter(r => isReservationActive(r.date, r.timeEnd)).sort((a,b) => a.date.localeCompare(b.date) || a.timeStart.localeCompare(b.timeStart)).map(res => (
                                            <div key={res.id} className="flex flex-col md:flex-row justify-between items-center p-10 bg-slate-50 rounded-[3.5rem] border border-emerald-100/40 shadow-sm">
                                                <div className="text-center md:text-left mb-8 md:mb-0">
                                                    <div className="font-black text-emerald-950 uppercase text-4xl italic leading-none">{res.location}</div>
                                                    <div className="flex flex-wrap items-center gap-4 mt-6 justify-center md:justify-start">
                                                        <span className="bg-white px-5 py-2 rounded-2xl text-[10px] font-black text-emerald-700 border border-emerald-100 uppercase italic">{res.group}</span>
                                                        <span className="text-[10px] font-bold text-slate-400 uppercase bg-slate-200/50 px-4 py-1.5 rounded-full">{res.date}</span>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-10 w-full md:w-auto">
                                                    <div className="font-mono font-black text-4xl bg-white px-10 py-5 rounded-[2.5rem] text-emerald-900 italic leading-none">{res.timeStart}-{res.timeEnd}</div>
                                                    <button onClick={() => deleteReservation(res.id)} className="p-6 text-slate-300 hover:text-red-500 font-bold text-4xl transition-colors">✕</button>
                                                </div>
                                            </div>
                                        ))
                                    ) : (
                                        <div className="text-center py-40 text-slate-200 font-black uppercase text-5xl italic opacity-30">Grafik pusty</div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'wycieczki' && (
                            <div className="bg-white p-12 rounded-[4.5rem] shadow-xl border border-blue-100 animate-in">
                                <h2 className="text-5xl font-black uppercase mb-12 italic text-slate-900 leading-none">
                                    <i data-lucide="compass" className="text-blue-600 inline mr-4"></i> Wycieczki
                                </h2>
                                <textarea className="w-full h-[600px] p-12 bg-blue-50/20 border-2 border-blue-100 rounded-[3rem] outline-none font-mono text-2xl font-bold leading-relaxed focus:border-blue-400 transition-colors" value={extraContent.wycieczki} onChange={e => updateContent('wycieczki', e.target.value)} placeholder="Godzina, Grupa, Miejsce..." />
                            </div>
                        )}

                        {activeTab === 'kontakt' && (
                            <div className="bg-white p-12 rounded-[4.5rem] shadow-xl border border-red-100 animate-in">
                                <h2 className="text-5xl font-black uppercase mb-12 italic text-red-600 leading-none">
                                    <i data-lucide="phone" className="text-red-600 inline mr-4"></i> Numery
                                </h2>
                                <div className="p-12 bg-red-50/20 border-2 border-red-100 rounded-[3rem] font-black text-2xl text-red-900 leading-relaxed shadow-inner">
                                    <p className="mb-4">Komendant: hm Agnieszka Ciepielewska 502498709</p>
                                    <p className="mb-4">z-ca komendanta: hm Grzegorz Ciepielewski 502498610</p>
                                    <p>Kwatermistrz: phm Jacek Kozieł 501294668</p>
                                </div>
                            </div>
                        )}
                    </main>

                    {isBookingModalOpen && (
                        <div className="fixed inset-0 bg-emerald-950/95 backdrop-blur-3xl z-[100] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden animate-in">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-black uppercase italic text-emerald-950 leading-none">Zajmij Punkt</h2>
                                    <button onClick={() => { setIsBookingModalOpen(false); setBookingError(null); }} className="w-10 h-10 bg-slate-100 rounded-full font-black text-lg">✕</button>
                                </div>
                                <form onSubmit={handleAdd} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black uppercase text-emerald-900 opacity-40 ml-4 italic">Miejsce</label>
                                        <select name="location" className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 font-bold italic outline-none focus:border-emerald-500">
                                            {LOCATIONS.map(l => <option key={l} value={l}>{l}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black uppercase text-emerald-900 opacity-40 ml-4 italic">Jednostka / Zastęp</label>
                                        <input name="group" className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 font-bold italic outline-none focus:border-emerald-500" placeholder="np. 22 DH" required />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input name="timeStart" type="time" className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 font-black text-2xl text-center" required />
                                        <input name="timeEnd" type="time" className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 font-black text-2xl text-center" required />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black uppercase text-emerald-900 opacity-40 ml-4 italic">Data</label>
                                        <input name="date" type="date" className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 font-bold italic" required defaultValue={getTodayDateStr(currentTime)} />
                                    </div>
                                    {bookingError && <div className="bg-red-50 border border-red-100 p-3 rounded-xl text-red-600 text-[10px] font-black uppercase text-center italic animate-pulse">{bookingError}</div>}
                                    <div className="flex flex-col gap-3 pt-4">
                                        <button type="submit" className="w-full bg-emerald-600 text-white py-5 rounded-[2rem] font-black uppercase tracking-[0.4em] text-lg italic leading-none">Zatwierdź</button>
                                        <button type="button" onClick={() => setIsBookingModalOpen(false)} className="w-full font-black uppercase text-slate-300 text-[10px]">Anuluj</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

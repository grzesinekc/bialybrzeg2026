<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stanica Biały Brzeg 2026</title>
    <!-- Biblioteki podstawowe -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Moduły Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCauw7c_x7mhypk9bYQ0nxADiToXHnJjY", 
            authDomain: "stanica-bialy-brzeg.firebaseapp.com",
            projectId: "stanica-bialy-brzeg",
            storageBucket: "stanica-bialy-brzeg.firebasestorage.app",
            messagingSenderId: "861747237880",
            appId: "1:861747237880:web:7d3ce04c6250381043fc0d",
            measurementId: "G-CF6C1FX1C7"
        };

        window.fb = { 
            initializeApp, getFirestore, collection, addDoc, onSnapshot, 
            doc, setDoc, deleteDoc, query, getAuth, signInAnonymously, 
            onAuthStateChanged, firebaseConfig 
        };
    </script>
</head>
<body class="bg-[#fcfbf7] text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const LOCATIONS = ["STOŁÓWKA", "DUŻA WIATA", "ŚWIETLICA DOLNA", "ŚWIETLICA GÓRNA", "ALTANKA 1", "ALTANKA 2", "ALTANKA 3", "ALTANKA 4"];
        const COMMANDANT_HASH = "8e04e9c7167527027d7e368147d34551a3d90f23078a66a16616086f6d0f1a96";
        
        const IMG_HEADER = "https://www.dropbox.com/scl/fi/h35st6ucsgr0vfaqk599p/IDENTYFIKATOR_BEZ-TEKSTU.png?rlkey=ql6aybqsctxferab69ozyhha9&st=g6ywzqam&dl=1";
        const IMG_LOGO = "https://www.dropbox.com/scl/fi/zr8lckek34w630una7jgc/logo-BB.jpg?rlkey=i605zzig81x7l8ji5yhyyiu5y&st=mrxsxpti&dl=1";

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [currentTime, setCurrentTime] = useState(new Date());
            const [reservations, setReservations] = useState([]);
            const [extraContent, setExtraContent] = useState({ jadlospis: '', kontakt: '', wycieczki: '' });
            const [isBookingModalOpen, setIsBookingModalOpen] = useState(false);
            const [isJadlospisEditing, setIsJadlospisEditing] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [error, setError] = useState(null);
            const [errorCode, setErrorCode] = useState(null);
            const [isInit, setIsInit] = useState(false);

            useEffect(() => {
                const startApp = async () => {
                    if (!window.fb) return;
                    try {
                        const app = window.fb.initializeApp(window.fb.firebaseConfig);
                        const database = window.fb.getFirestore(app);
                        const auth = window.fb.getAuth(app);
                        setDb(database);
                        
                        await window.fb.signInAnonymously(auth).then(cred => {
                            setUser(cred.user);
                            setIsInit(true);
                        }).catch(authErr => {
                            setErrorCode(authErr.code);
                            setError(authErr.message);
                        });
                    } catch (initErr) {
                        setError(initErr.message);
                    }
                };
                setTimeout(startApp, 500);
            }, []);

            useEffect(() => {
                if (!db || !user) return;
                const unsubRes = window.fb.onSnapshot(window.fb.collection(db, 'reservations'), (snap) => {
                    setReservations(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, (err) => {
                    setErrorCode('firestore-error');
                    setError(err.message);
                });

                const unsubContent = window.fb.onSnapshot(window.fb.doc(db, 'content', 'main'), (snap) => {
                    if (snap.exists()) setExtraContent(snap.data());
                });
                return () => { unsubRes(); unsubContent(); };
            }, [db, user]);

            useEffect(() => {
                const t = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(t);
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, isInit, isBookingModalOpen]);

            const checkPassword = async (e) => {
                e.preventDefault();
                const hashedInput = await sha256(passwordInput);
                if (hashedInput === COMMANDANT_HASH) {
                    setIsJadlospisEditing(true);
                } else {
                    alert("Nieprawidłowe hasło komendanta!");
                }
            };

            const handleAdd = async (e) => {
                e.preventDefault();
                const formData = {
                    location: e.target.location.value,
                    group: e.target.group.value,
                    timeStart: e.target.timeStart.value,
                    timeEnd: e.target.timeEnd.value,
                    date: e.target.date.value
                };
                
                try {
                    await window.fb.addDoc(window.fb.collection(db, 'reservations'), formData);
                    setIsBookingModalOpen(false); // Automatyczne zamykanie okna
                } catch (err) {
                    alert("Wystąpił błąd podczas zapisu: " + err.message);
                }
            };

            const updateContent = async (key, val) => {
                if (!db) return;
                await window.fb.setDoc(window.fb.doc(db, 'content', 'main'), { ...extraContent, [key]: val }, { merge: true });
            };

            const deleteReservation = async (id) => {
                if(confirm("Czy na pewno chcesz usunąć ten wpis z grafiku?")) {
                    await window.fb.deleteDoc(window.fb.doc(db, 'reservations', id));
                }
            }

            if (error) return (
                <div className="min-h-screen bg-red-50 flex flex-col items-center justify-center p-6 text-center">
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl border-4 border-red-100 max-w-xl w-full">
                        <img src={IMG_LOGO} className="w-24 h-24 mx-auto mb-8 rounded-full border-2 border-slate-100 shadow-xl" />
                        <h2 className="text-red-600 font-black text-4xl mb-2 uppercase italic tracking-tighter leading-none">Status: Błąd</h2>
                        <p className="text-slate-400 font-black text-[10px] uppercase tracking-[0.4em] mb-8 italic">Diagnostic Code: {errorCode}</p>
                        
                        <div className="bg-slate-50 p-8 rounded-[2rem] border border-slate-200 mb-8 text-left space-y-5">
                            <p className="text-slate-700 font-bold text-base leading-relaxed">{error}</p>
                            <div className="text-[11px] text-slate-500 font-medium border-t pt-5">
                                <p className="font-black uppercase text-slate-800 mb-3 tracking-widest italic">Ostatnia próba ratunku:</p>
                                <ol className="list-decimal ml-5 space-y-3">
                                    <li>Sprawdź <span className="font-black text-slate-900 italic">Firebase -> Auth -> Settings -> Authorized domains</span> (dodaj grzesinekc.github.io).</li>
                                    <li>Sprawdź <span className="font-black text-slate-900 italic">Google Cloud -> Credentials</span> (klucz musi mieć gwiazdkę na końcu adresu: grzesinekc.github.io/*).</li>
                                    <li>Jeśli to nie działa, <span className="font-black text-emerald-600 underline">wygeneruj całkiem nowy klucz</span> i wklej go poniżej.</li>
                                </ol>
                            </div>
                        </div>
                        <button onClick={() => window.location.reload()} className="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black uppercase tracking-[0.4em] hover:bg-black transition-all shadow-2xl active:scale-95 text-xs">Odśwież i ponów próbę</button>
                    </div>
                </div>
            );
            
            if (!isInit) return (
                <div className="min-h-screen bg-[#064e3b] flex flex-col items-center justify-center text-white font-black italic">
                    <img src={IMG_LOGO} alt="Logo BB" className="w-32 h-32 rounded-full mb-8 animate-pulse shadow-2xl border-4 border-white/20" />
                    <p className="tracking-[0.5em] text-emerald-400 text-[10px] mb-2 uppercase font-black">Hufiec ZHP Radomsko</p>
                    <p className="animate-pulse">SYNCHRONIZACJA Z BAZĄ STANICY...</p>
                </div>
            );

            return (
                <div className="min-h-screen pb-20 selection:bg-emerald-200">
                    <header 
                        className="bg-emerald-950 text-white p-8 md:p-24 relative overflow-hidden bg-cover bg-center"
                        style={{ backgroundImage: `url('${IMG_HEADER}')` }}
                    >
                        <div className="absolute inset-0 bg-emerald-950/80 backdrop-blur-[1.5px]"></div>
                        
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-10 relative z-10">
                            <div className="flex flex-col md:flex-row items-center gap-10 text-center md:text-left">
                                <img src={IMG_LOGO} alt="Logo BB" className="w-24 h-24 md:w-44 md:h-44 rounded-full border-4 border-white/20 shadow-2xl transition-transform hover:scale-110 duration-500" />
                                <div>
                                    <h1 className="text-5xl md:text-8xl font-black italic tracking-tighter leading-none">BIAŁY BRZEG 2026</h1>
                                    <p className="text-emerald-400 font-black uppercase tracking-[0.5em] text-[10px] mt-8 flex items-center justify-center md:justify-start gap-3 italic">
                                        <span className="w-3 h-3 bg-emerald-400 rounded-full animate-pulse shadow-[0_0_15px_rgba(52,211,153,0.8)]"></span>
                                        LIVE MONITORING SYSTEM
                                    </p>
                                </div>
                            </div>
                            <div className="bg-black/40 p-12 rounded-[3.5rem] text-center border border-white/10 backdrop-blur-2xl shadow-2xl min-w-[340px]">
                                <div className="text-7xl font-mono font-black text-emerald-300 tracking-tighter tabular-nums leading-none">
                                    {currentTime.toLocaleTimeString('pl-PL')}
                                </div>
                                <div className="text-[10px] font-black uppercase tracking-[0.5em] opacity-40 mt-6 italic text-center">
                                    Hufiec Radomsko • Stanica BB
                                </div>
                            </div>
                        </div>
                    </header>

                    <nav className="max-w-6xl mx-auto -mt-10 px-4 sticky top-6 z-40">
                        <div className="bg-white/95 backdrop-blur-md rounded-[3rem] shadow-2xl border border-emerald-100 p-2 flex overflow-x-auto no-scrollbar gap-1">
                            {[
                                { id: 'home', label: 'Start', icon: 'home' },
                                { id: 'rezerwacje', label: 'Grafik', icon: 'map-pin' },
                                { id: 'jadlospis', label: 'Jadłospis', icon: 'utensils' },
                                { id: 'wycieczki', label: 'Wycieczki', icon: 'compass' },
                                { id: 'kontakt', label: 'Kontakt', icon: 'phone' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-3 px-10 py-6 rounded-[2.5rem] transition-all flex-1 justify-center whitespace-nowrap ${activeTab === tab.id ? 'bg-emerald-600 text-white shadow-xl scale-[1.03] font-black' : 'text-emerald-900/40 hover:bg-emerald-50 font-bold'}`}>
                                    <i data-lucide={tab.icon} className="w-5 h-5"></i>
                                    <span className="text-[11px] uppercase tracking-widest">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto p-6 mt-16">
                        {/* WIDOK STARTOWY */}
                        {activeTab === 'home' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-12 animate-in">
                                <div className="bg-white p-14 rounded-[4.5rem] shadow-sm border border-emerald-50 flex flex-col">
                                    <h2 className="text-3xl font-black uppercase italic mb-10 flex items-center gap-5 text-emerald-950 leading-none">
                                        <i data-lucide="calendar" className="text-emerald-600 w-8 h-8"></i>
                                        Plan na dzisiaj
                                    </h2>
                                    <div className="space-y-5 flex-1">
                                        {reservations.filter(r => r.date === new Date().toISOString().split('T')[0]).length > 0 ? (
                                            reservations.filter(r => r.date === new Date().toISOString().split('T')[0]).map(r => (
                                                <div key={r.id} className="p-7 bg-emerald-50/50 border border-emerald-100 rounded-[2.5rem] flex justify-between items-center group transition-all hover:bg-emerald-100/50">
                                                    <span className="font-black text-emerald-800 text-3xl tabular-nums leading-none italic">{r.timeStart} - {r.timeEnd}</span>
                                                    <span className="uppercase font-black text-emerald-950 text-[10px] tracking-widest bg-white px-4 py-2 rounded-full shadow-sm">{r.location}</span>
                                                </div>
                                            ))
                                        ) : (
                                            <div className="text-center py-24 text-slate-300 font-bold italic border-4 border-dashed border-slate-50 rounded-[3.5rem] uppercase tracking-[0.4em] text-[10px]">
                                                Brak zaplanowanych zajęć
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="bg-emerald-900 text-white p-14 rounded-[4.5rem] shadow-2xl relative overflow-hidden group">
                                    <img src={IMG_LOGO} className="absolute -bottom-24 -right-24 w-96 h-96 opacity-5 grayscale group-hover:rotate-12 transition-transform duration-1000" />
                                    <h2 className="text-3xl font-black mb-10 uppercase italic flex items-center gap-5 text-emerald-400 leading-none">
                                        <i data-lucide="utensils" className="text-emerald-400 w-8 h-8"></i>
                                        Kuchnia BB
                                    </h2>
                                    <div className="italic text-emerald-50 text-3xl whitespace-pre-wrap leading-relaxed font-black">
                                        {extraContent.jadlospis || "Menu zostanie wkrótce ogłoszone."}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* JADŁOSPIS */}
                        {activeTab === 'jadlospis' && (
                            <div className="max-w-4xl mx-auto bg-white p-14 rounded-[5.5rem] shadow-2xl text-center border border-orange-100 animate-in">
                                <h2 className="text-7xl font-black uppercase mb-16 italic tracking-tighter text-slate-900 leading-none">Menu Dnia</h2>
                                {!isJadlospisEditing ? (
                                    <>
                                        <div className="p-20 bg-orange-50/50 rounded-[5rem] italic text-4xl min-h-[550px] mb-16 flex items-center justify-center border-2 border-orange-100/30 font-black leading-relaxed shadow-inner text-slate-800">
                                            {extraContent.jadlospis || "Zapach obiadu niesie się przez las..."}
                                        </div>
                                        <div className="bg-slate-50 p-14 rounded-[4.5rem] border border-slate-200">
                                            <div className="text-[10px] font-black uppercase tracking-[0.6em] text-slate-400 mb-10 italic">Weryfikacja Komendanta</div>
                                            <form onSubmit={checkPassword} className="flex flex-col sm:flex-row gap-5 w-full max-w-sm mx-auto">
                                                <input type="password" placeholder="Hasło..." className="flex-1 p-7 bg-white border-2 rounded-[2rem] outline-none focus:border-emerald-500 font-black shadow-sm text-2xl" onChange={e => setPasswordInput(e.target.value)} />
                                                <button type="submit" className="bg-slate-900 text-white px-14 py-7 rounded-[2rem] font-black text-[11px] uppercase hover:bg-black transition-all shadow-xl active:scale-95 tracking-widest leading-none">Edytuj</button>
                                            </form>
                                        </div>
                                    </>
                                ) : (
                                    <div className="space-y-10 animate-in zoom-in-95 duration-200">
                                        <textarea className="w-full h-[650px] p-20 border-4 border-emerald-100 rounded-[5rem] outline-none text-4xl italic font-black text-center bg-emerald-50/20 shadow-inner focus:border-emerald-500 transition-all leading-relaxed" value={extraContent.jadlospis} onChange={e => updateContent('jadlospis', e.target.value)} />
                                        <button onClick={() => setIsJadlospisEditing(false)} className="w-full bg-emerald-600 text-white py-12 rounded-[3.5rem] font-black uppercase tracking-[0.5em] text-3xl shadow-2xl transition-transform active:scale-95 leading-none italic">Zatwierdź menu</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* GRAFIK MIEJSC */}
                        {activeTab === 'rezerwacje' && (
                            <div className="bg-white p-14 rounded-[5.5rem] shadow-xl border border-emerald-50 animate-in">
                                <div className="flex flex-col sm:flex-row justify-between items-center mb-20 gap-12">
                                    <div>
                                        <h2 className="text-7xl font-black uppercase italic tracking-tighter text-emerald-950 leading-none">Grafik</h2>
                                        <p className="text-slate-400 font-bold text-[11px] uppercase tracking-[0.5em] mt-6 italic">Monitor punktów programowych</p>
                                    </div>
                                    <button onClick={() => setIsBookingModalOpen(true)} className="bg-emerald-600 hover:bg-emerald-700 text-white px-14 py-8 rounded-[3.5rem] font-black text-xs uppercase shadow-2xl transition-transform active:scale-95 flex items-center gap-5 tracking-widest leading-none">
                                        <i data-lucide="plus" className="w-6 h-6"></i> Dodaj wpis
                                    </button>
                                </div>
                                <div className="space-y-8">
                                    {reservations.length > 0 ? (
                                        reservations.sort((a,b) => a.date.localeCompare(b.date) || a.timeStart.localeCompare(b.timeStart)).map(res => (
                                            <div key={res.id} className="flex flex-col md:flex-row justify-between items-center p-14 bg-slate-50 rounded-[4.5rem] hover:bg-emerald-50 transition-all border border-emerald-100/40 group shadow-sm">
                                                <div className="text-center md:text-left mb-10 md:mb-0">
                                                    <div className="font-black text-emerald-950 uppercase text-5xl tracking-tighter leading-none italic">{res.location}</div>
                                                    <div className="flex flex-wrap items-center gap-5 mt-8 justify-center md:justify-start">
                                                        <span className="bg-white px-6 py-2.5 rounded-2xl text-[11px] font-black text-emerald-700 border border-emerald-100 uppercase shadow-sm italic tracking-widest">{res.group}</span>
                                                        <span className="text-[11px] font-bold text-slate-400 uppercase tracking-widest bg-slate-200/50 px-5 py-2 rounded-full">{res.date}</span>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-12 w-full md:w-auto">
                                                    <div className="font-mono font-black text-5xl bg-white px-14 py-7 rounded-[3.5rem] border border-emerald-50 text-emerald-900 shadow-inner flex-1 text-center md:flex-none tabular-nums italic leading-none">
                                                        {res.timeStart}-{res.timeEnd}
                                                    </div>
                                                    <button onClick={() => deleteReservation(res.id)} className="p-8 text-slate-200 hover:text-red-500 font-bold transition-all text-5xl hover:bg-red-50 rounded-[2.5rem]">✕</button>
                                                </div>
                                            </div>
                                        ))
                                    ) : (
                                        <div className="text-center py-60 text-slate-200 font-black uppercase tracking-[0.6em] text-6xl italic opacity-20">Grafik pusty</div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* WYCIECZKI */}
                        {activeTab === 'wycieczki' && (
                            <div className="bg-white p-14 rounded-[5.5rem] shadow-xl border border-blue-100 animate-in">
                                <h2 className="text-6xl font-black uppercase mb-16 italic tracking-tighter flex items-center gap-10 text-slate-900 leading-none">
                                    <i data-lucide="compass" className="text-blue-600 w-14 h-14"></i>
                                    Wycieczki
                                </h2>
                                <textarea className="w-full h-[700px] p-20 bg-blue-50/20 border-2 border-blue-100 rounded-[5.5rem] outline-none font-mono text-3xl font-bold leading-relaxed shadow-inner focus:border-blue-400 transition-all" value={extraContent.wycieczki} onChange={e => updateContent('wycieczki', e.target.value)} placeholder="Zapisz aktualne wyjścia..." />
                            </div>
                        )}

                        {/* KONTAKT */}
                        {activeTab === 'kontakt' && (
                            <div className="bg-white p-14 rounded-[5.5rem] shadow-xl border border-red-100 animate-in">
                                <h2 className="text-6xl font-black uppercase mb-16 italic text-red-600 flex items-center gap-10 leading-none">
                                    <i data-lucide="phone" className="text-red-600 w-14 h-14"></i>
                                    Alarmowe
                                </h2>
                                <textarea className="w-full h-[700px] p-20 bg-red-50/20 border-2 border-red-100 rounded-[5.5rem] outline-none font-black text-3xl text-red-900 leading-relaxed shadow-inner focus:border-red-400 transition-all" value={extraContent.kontakt} onChange={e => updateContent('kontakt', e.target.value)} placeholder="Numery do kadry i służb..." />
                            </div>
                        )}
                    </main>

                    {/* MODAL REZERWACJI */}
                    {isBookingModalOpen && (
                        <div className="fixed inset-0 bg-emerald-950/95 backdrop-blur-3xl z-[100] flex items-center justify-center p-4 overflow-y-auto">
                            <div className="bg-white w-full max-w-3xl rounded-[6.5rem] p-24 shadow-2xl relative overflow-hidden animate-in">
                                <img src={IMG_LOGO} className="absolute -top-32 -left-32 w-[30rem] h-[30rem] opacity-5 grayscale" />
                                <div className="flex justify-between items-center mb-16 relative z-10">
                                    <h2 className="text-6xl font-black uppercase italic tracking-tighter text-emerald-950 leading-none">Zajmij Punkt</h2>
                                    <button onClick={() => setIsBookingModalOpen(false)} className="w-24 h-24 bg-slate-100 rounded-full flex items-center justify-center font-black hover:bg-red-50 hover:text-red-500 transition-all text-3xl shadow-inner">✕</button>
                                </div>
                                <form onSubmit={handleAdd} className="space-y-12 relative z-10">
                                    <div className="space-y-4">
                                        <label className="text-[11px] font-black uppercase tracking-[0.6em] text-emerald-900 ml-12 opacity-40 italic">Lokalizacja punktu</label>
                                        <select name="location" className="w-full p-9 bg-slate-50 rounded-[4rem] border-none font-black text-3xl appearance-none cursor-pointer focus:ring-4 focus:ring-emerald-100 transition-all shadow-sm italic text-center">
                                            {LOCATIONS.map(l => <option key={l} value={l}>{l}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-4">
                                        <label className="text-[11px] font-black uppercase tracking-[0.6em] text-emerald-900 ml-12 opacity-40 italic">Jednostka / Zastęp</label>
                                        <input name="group" className="w-full p-9 bg-slate-50 rounded-[4rem] border-none font-black text-3xl focus:ring-4 focus:ring-emerald-100 transition-all shadow-sm italic text-center" placeholder="np. 22 DH 'Burza'" required />
                                    </div>
                                    <div className="grid grid-cols-2 gap-12">
                                        <div className="space-y-4 text-center">
                                            <label className="text-[11px] font-black uppercase tracking-[0.6em] text-emerald-900 opacity-40 italic">Od godziny</label>
                                            <input name="timeStart" type="time" className="w-full p-9 bg-slate-50 rounded-[4rem] border-none font-black text-6xl text-center focus:ring-4 focus:ring-emerald-100 transition-all shadow-sm tabular-nums" required />
                                        </div>
                                        <div className="space-y-4 text-center">
                                            <label className="text-[11px] font-black uppercase tracking-[0.6em] text-emerald-900 opacity-40 italic">Do godziny</label>
                                            <input name="timeEnd" type="time" className="w-full p-9 bg-slate-50 rounded-[4rem] border-none font-black text-6xl text-center focus:ring-4 focus:ring-emerald-100 transition-all shadow-sm tabular-nums" required />
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <label className="text-[11px] font-black uppercase tracking-[0.6em] text-emerald-900 ml-12 opacity-40 italic">Dzień rezerwacji</label>
                                        <input name="date" type="date" className="w-full p-9 bg-slate-50 rounded-[4rem] border-none font-black text-3xl focus:ring-4 focus:ring-emerald-100 transition-all shadow-sm italic text-center" required defaultValue={new Date().toISOString().split('T')[0]} />
                                    </div>
                                    <div className="flex flex-col gap-8 pt-12">
                                        <button type="submit" className="w-full bg-emerald-600 text-white py-12 rounded-[5rem] font-black uppercase tracking-[0.6em] text-4xl shadow-2xl hover:scale-[1.02] active:scale-95 transition-all italic leading-none">Zatwierdź grafik</button>
                                        <button type="button" onClick={() => setIsBookingModalOpen(false)} className="w-full font-black uppercase tracking-[0.5em] text-slate-300 text-[11px] py-4">Powrót</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <footer className="fixed bottom-10 left-0 right-0 flex justify-center pointer-events-none z-50 px-6">
                        <div className="bg-emerald-950/95 backdrop-blur-3xl text-white px-16 py-7 rounded-full text-[11px] font-black uppercase tracking-[0.7em] shadow-[0_25px_70px_rgba(0,0,0,0.5)] border border-white/10 pointer-events-auto flex items-center gap-10 animate-in italic whitespace-nowrap overflow-hidden leading-none">
                            <img src={IMG_LOGO} className="w-12 h-12 rounded-full border border-white/20" />
                            <span>Biały Brzeg 2026 • Live Monitoring System</span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }

        @keyframes fade-in { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fade-in 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        * { -webkit-tap-highlight-color: transparent; }
        body { background-color: #fcfbf7; overflow-x: hidden; }
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(1) brightness(0.6);
        }
    </style>
</body>
</html>
